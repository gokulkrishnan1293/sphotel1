services:
  backend:
    build:
      context: ./backend
      target: production
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: pnpm dev --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      VITE_APP_TYPE: admin

  print-agent:
    build:
      context: ./print-agent
      dockerfile: Dockerfile.dev
    volumes:
      - ./print-agent:/app
      - print_agent_key:/root/.sphotel-agent
    environment:
      SPHOTEL_API_URL: http://backend:8000
      PRINTER_TYPE: file
      PRINTER_FILE: /tmp/agent_print.bin
    command: sh -c "while true; do python -m agent; echo 'Agent exited, retrying in 5s...'; sleep 5; done"
    ports:
      - "8765:8765"
      - "8766:8766"
    depends_on:
      - backend

  db:
    ports:
      - "5432:5432"

  valkey:
    ports:
      - "6379:6379"

volumes:
  print_agent_key:
