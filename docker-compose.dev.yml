services:
  backend:
    build:
      context: ./backend
      target: production
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: pnpm dev --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    env_file:
      - .env

  db:
    ports:
      - "5432:5432"

  valkey:
    ports:
      - "6379:6379"
