# Single production deployment file.
# Domain routing is managed via Dokploy's Domains UI — no Traefik labels needed.
#
# Required environment variables (set in Dokploy dashboard, never committed):
#   DOMAIN          — e.g. sphotel.yourdomain.com
#   POSTGRES_USER
#   POSTGRES_PASSWORD
#   VALKEY_PASSWORD

services:
  backend:
    build:
      context: ./backend
      target: production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - logo_data:/app/uploads/logos

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sphotel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d sphotel"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--requirepass", "${VALKEY_PASSWORD}"]
    volumes:
      - valkey_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backup:
    build:
      context: ./infra/backup
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  valkey_data:
  logo_data:
